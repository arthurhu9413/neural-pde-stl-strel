# 2D Heat equation -- baseline + STREL monitoring
experiment: heat2d
tag: heat2d_baseline
device: auto
dtype: float32

physics:
  alpha: 0.5           # thermal diffusivity
  ic_amplitude: 1.0
  ic_sharpness: 50.0   # Gaussian sharpness for initial condition
  ic_center_x: 0.5
  ic_center_y: 0.5
  bcic_weight: 10.0
  n_boundary: 512
  n_initial: 512

grid:
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  t_min: 0.0
  t_max: 1.0
  n_x: 32
  n_y: 32
  n_t: 50

model:
  hidden: [64, 64, 64]
  activation: tanh

optim:
  epochs: 200
  lr: 0.001
  batch: 4096
  grad_clip: 1.0

stl:
  use: false             # baseline: no STL regularization

strel_audit:
  export: true
  run: false
  packed_field_path: heat2d_field_xy_t.npy
  dt_path: heat2d_dt.txt
  layout: xy_t
  mls_path: scripts/specs/contain_hotspot.mls
  formula: contain_hotspot
  binarize: true
  moonlight: true
  plots: true

io:
  results_dir: results
  save_ckpt: true
  save_metrics: true
  save_frames: true
  save_figs: true
  print_every: 10
