# Neuromancer STL demo -- sine function with bound constraint
experiment: neuromancer_sine_bound
tag: neuromancer_sine_bound
seed: 42
device: null
dtype: float32

problem:
  type: sine_bound
  domain: [0.0, 6.283185]  # [0, 2*pi]
  n_train: 256
  n_test: 512
  noise_std: 0.0

model:
  hidden: [32, 32]
  activation: relu

optim:
  epochs: 200
  lr: 0.001
  batch: 64

stl:
  use: true
  spec: "always[0,6.28](y <= 0.9)"
  weight: 2.0
  threshold: 0.9  # y <= threshold
  temp: 0.1
  penalty: softplus
  beta: 10.0

io:
  results_dir: results
  save_ckpt: true
  save_metrics: true
